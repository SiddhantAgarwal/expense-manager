{{template "base" .}}

{{define "title"}}{{if .IsEdit}}Edit{{else}}New{{end}} Expense — Expense Manager{{end}}

{{define "content"}}
<div class="page-header">
  <h1>{{if .IsEdit}}Edit{{else}}New{{end}} Expense</h1>
</div>

<div class="card">
  <form method="POST" action="{{if .IsEdit}}/expenses/{{.Expense.ID}}{{else}}/expenses{{end}}">
    {{if .IsEdit}}
    <input type="hidden" name="_method" value="PUT">
    {{end}}

    <div class="form-row">
      <div class="form-group">
        <label for="amount">Amount</label>
        <input type="number" id="amount" name="amount" step="0.01" min="0.01"
          value="{{if .IsEdit}}{{printf "%.2f" .Expense.Amount}}{{end}}" required>
      </div>
      <div class="form-group">
        <label for="currency">Currency</label>
        <select id="currency" name="currency" required>
          {{range .Currencies}}
          <option value="{{.}}" {{if $.IsEdit}}{{if eq $.Expense.Currency .}}selected{{end}}{{else}}{{if eq $.DefaultCurrency .}}selected{{end}}{{end}}>{{.}}</option>
          {{end}}
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" name="category" required>
          {{range .Categories}}
          <option value="{{.}}" {{if $.IsEdit}}{{if eq $.Expense.Category .}}selected{{end}}{{end}}>{{.}}</option>
          {{end}}
        </select>
      </div>
      <div class="form-group">
        <label for="date">Date</label>
        <input type="date" id="date" name="date"
          value="{{if .IsEdit}}{{.Expense.Date}}{{else}}{{.Today}}{{end}}" required>
      </div>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <input type="text" id="description" name="description"
        value="{{if .IsEdit}}{{.Expense.Description}}{{end}}" placeholder="What was this for?">
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="/expenses" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{{end}}
