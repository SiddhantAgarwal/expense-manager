version: 2

project_name: expense-manager

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: expense-manager
    main: ./cmd/server
    binary: expense-manager
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: expense-manager
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  use: github
  format: "{{ .Message }}"
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^Merge pull request"

release:
  draft: false
  prerelease: auto
  mode: replace
  name_template: "{{ .ProjectName }} {{ .Version }}"
  footer: |
    ## Quick Start

    Download the binary for your platform, make it executable, and run:

    ```bash
    ./expense-manager
    ```

    The server starts on **http://localhost:8080** by default.
